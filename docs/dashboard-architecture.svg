<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#10b981"/>
    </marker>
    <style>
      .title  { fill:#f1f5f9; font-size:22px; font-weight:800; }
      .sub    { fill:#94a3b8; font-size:12px; }
      .box    { fill:#111827; stroke:rgba(255,255,255,0.10); stroke-width:1.5; }
      .h      { fill:#f1f5f9; font-size:14px; font-weight:700; }
      .t      { fill:#cbd5e1; font-size:11.5px; }
      .mono   { fill:#94a3b8; font-size:10.5px; font-family:'JetBrains Mono', ui-monospace, monospace; }
      .lbl    { fill:#94a3b8; font-size:11px; font-style:italic; }
      .edge   { stroke:#94a3b8; stroke-width:2; fill:none; }
      .edgeG  { stroke:#10b981; stroke-width:2; fill:none; }
      .badge  { fill:#1e293b; stroke:rgba(255,255,255,0.08); stroke-width:1; }
      .ok     { fill:#34d399; font-size:11px; font-weight:700; }
      .warn   { fill:#fbbf24; font-size:11px; font-weight:700; }
    </style>
  </defs>

  <rect width="900" height="760" fill="#0a0f1c"/>

  <text x="40" y="46" class="title">DockPilot &#183; Enterprise Dashboard &#8212; Fast-Load Architecture</text>
  <text x="40" y="68" class="sub">Render the shell in &lt;300ms &#8212; never block the page on `docker stats`. Live data hydrates asynchronously from a warm cache.</text>

  <!-- BEFORE / AFTER strip -->
  <rect x="40" y="88" width="390" height="74" rx="12" class="box"/>
  <text x="58" y="112" class="h" fill="#f87171">Before &#183; synchronous</text>
  <text x="58" y="133" class="mono">GET /  &#8594;  ps &#8594; stats(--no-stream) &#8594; images</text>
  <text x="58" y="151" class="warn">~2.3s blocking &#183; no timeout &#183; daemon can hang page</text>

  <rect x="470" y="88" width="390" height="74" rx="12" class="box"/>
  <text x="488" y="112" class="h" fill="#34d399">After &#183; cached + parallel</text>
  <text x="488" y="133" class="mono">GET /  &#8594;  shell from warm cache (parallel reads)</text>
  <text x="488" y="151" class="ok">&lt;300ms first paint &#183; live stats stream in via /api</text>

  <!-- BROWSER -->
  <rect x="330" y="196" width="240" height="58" rx="14" fill="url(#accent)"/>
  <text x="450" y="221" text-anchor="middle" class="h" fill="#ffffff">Browser</text>
  <text x="450" y="240" text-anchor="middle" class="t" fill="#dbeafe">GET / &#183; then polls JSON every 3s</text>

  <line x1="450" y1="254" x2="450" y2="290" class="edge" marker-end="url(#arrow)"/>
  <text x="460" y="277" class="lbl">HTTP (basic auth)</text>

  <!-- HTTP SERVER LAYER -->
  <rect x="60" y="292" width="780" height="150" rx="16" fill="#0d1424" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
  <text x="80" y="316" class="h">DockPilot HTTP server &#183; net/http mux</text>
  <text x="80" y="334" class="mono">middleware: withLogging (structured) &#183; withBasicAuth &#183; per-request context timeout</text>

  <!-- handleDashboard -->
  <rect x="80" y="348" width="220" height="78" rx="12" class="box"/>
  <text x="190" y="372" text-anchor="middle" class="h">handleDashboard</text>
  <text x="190" y="392" text-anchor="middle" class="t">renders HTML shell only</text>
  <text x="190" y="410" text-anchor="middle" class="mono">reads warm cache &#8594; instant</text>

  <!-- /api/stats -->
  <rect x="340" y="348" width="220" height="78" rx="12" class="box"/>
  <text x="450" y="372" text-anchor="middle" class="h">/api/dashboard.json</text>
  <text x="450" y="392" text-anchor="middle" class="t">live containers + stats</text>
  <text x="450" y="410" text-anchor="middle" class="mono">served from cache &#8594; instant</text>

  <!-- observability -->
  <rect x="600" y="348" width="220" height="78" rx="12" class="box"/>
  <text x="710" y="372" text-anchor="middle" class="h">/healthz &#183; /metrics</text>
  <text x="710" y="392" text-anchor="middle" class="t">liveness + Prometheus</text>
  <text x="710" y="410" text-anchor="middle" class="mono">cache age &#183; req latency &#183; errors</text>

  <line x1="190" y1="442" x2="190" y2="486" class="edgeG" marker-end="url(#arrowGreen)"/>
  <line x1="450" y1="442" x2="450" y2="486" class="edgeG" marker-end="url(#arrowGreen)"/>
  <text x="200" y="470" class="lbl" fill="#34d399">read (RLock)</text>

  <!-- WARM CACHE -->
  <rect x="250" y="488" width="400" height="92" rx="16" fill="url(#cool)"/>
  <text x="450" y="516" text-anchor="middle" class="h" fill="#022c22">Warm in-memory cache &#183; sync.RWMutex</text>
  <text x="450" y="538" text-anchor="middle" class="t" fill="#022c22">{ containers, stats, images, collectedAt }</text>
  <text x="450" y="558" text-anchor="middle" class="mono" fill="#022c22">readers never touch Docker &#183; served in microseconds</text>

  <line x1="450" y1="580" x2="450" y2="616" class="edge" marker-end="url(#arrow)"/>
  <text x="460" y="603" class="lbl">refreshed by (Lock)</text>

  <!-- BACKGROUND COLLECTOR -->
  <rect x="190" y="618" width="520" height="96" rx="16" class="box"/>
  <text x="450" y="644" text-anchor="middle" class="h">Background collector &#183; goroutine on time.Ticker (~3s)</text>
  <text x="450" y="666" text-anchor="middle" class="t">runs Docker calls in parallel with hard context timeouts</text>
  <text x="290" y="694" class="mono" fill="#93c5fd">docker ps -a</text>
  <text x="430" y="694" class="mono" fill="#fca5a5">docker stats --no-stream</text>
  <text x="610" y="694" class="mono" fill="#93c5fd">docker images</text>

  <!-- side note: docker daemon -->
  <line x1="710" y1="666" x2="800" y2="666" class="edge" marker-end="url(#arrow)"/>
  <rect x="800" y="636" width="78" height="60" rx="12" fill="url(#warm)"/>
  <text x="839" y="662" text-anchor="middle" class="h" fill="#451a03">Docker</text>
  <text x="839" y="680" text-anchor="middle" class="t" fill="#451a03">daemon</text>

  <text x="40" y="744" class="sub">Key win: `docker stats --no-stream` (the ~1.5&#8211;2s cost) moves off the request path into the ticker. Page requests only ever read RAM.</text>
</svg>
