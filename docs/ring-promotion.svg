<svg xmlns="http://www.w3.org/2000/svg" width="780" height="700" viewBox="0 0 780 700" font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#94a3b8"/>
    </marker>
    <style>
      .title  { fill:#f1f5f9; font-size:21px; font-weight:800; }
      .sub    { fill:#94a3b8; font-size:12px; }
      .box     { fill:#111827; stroke:rgba(255,255,255,0.10); stroke-width:1.5; rx:14; }
      .h      { fill:#f1f5f9; font-size:14px; font-weight:700; }
      .t      { fill:#cbd5e1; font-size:11.5px; }
      .mono   { fill:#94a3b8; font-size:10.5px; font-family:'JetBrains Mono', ui-monospace, monospace; }
      .lbl    { fill:#94a3b8; font-size:11px; font-style:italic; }
      .edge   { stroke:#94a3b8; stroke-width:2; fill:none; }
    </style>
  </defs>

  <rect width="780" height="700" fill="#0a0f1c"/>

  <text x="40" y="44" class="title">DockPilot &#183; CI-Gated Ring Promotion</text>
  <text x="40" y="66" class="sub">Push to main &#8594; tests must pass &#8594; promote one build through rings (INT &#8594; TEST)</text>

  <!-- 1. Push -->
  <rect x="270" y="92" width="240" height="48" rx="14" fill="url(#accent)"/>
  <text x="390" y="121" text-anchor="middle" class="h" fill="#ffffff">git push &#8594; main</text>

  <line x1="390" y1="140" x2="390" y2="168" class="edge" marker-end="url(#arrow)"/>

  <!-- 2. CI -->
  <rect x="240" y="170" width="300" height="62" class="box" rx="14"/>
  <text x="390" y="194" text-anchor="middle" class="h">CI workflow</text>
  <text x="390" y="214" text-anchor="middle" class="mono">go vet &#183; go build &#183; go test ./...</text>

  <line x1="390" y1="232" x2="390" y2="262" class="edge" marker-end="url(#arrow)"/>
  <text x="400" y="252" class="lbl">on success (workflow_run)</text>

  <!-- 3. Build once -->
  <rect x="240" y="264" width="300" height="66" class="box" rx="14"/>
  <text x="390" y="288" text-anchor="middle" class="h">Build binary &#183; once</text>
  <text x="390" y="307" text-anchor="middle" class="t">ubuntu-latest &#183; linux/amd64</text>
  <text x="390" y="323" text-anchor="middle" class="mono">upload-artifact: dockpilot-binary</text>

  <line x1="390" y1="330" x2="390" y2="360" class="edge" marker-end="url(#arrow)"/>

  <!-- RING 1 INT -->
  <rect x="60" y="362" width="660" height="118" rx="18" fill="rgba(34,197,94,0.06)" stroke="rgba(34,197,94,0.35)" stroke-width="1.5"/>
  <circle cx="92" cy="392" r="13" fill="#22c55e"/>
  <text x="92" y="397" text-anchor="middle" font-size="13" font-weight="800" fill="#07140f">1</text>
  <text x="116" y="397" class="h" fill="#86efac">RING 1 &#183; INT</text>
  <text x="116" y="414" class="sub">slworker00 &#183; runner label: int</text>

  <rect x="92" y="424" width="290" height="44" rx="10" fill="#111827" stroke="rgba(255,255,255,0.10)"/>
  <text x="106" y="442" class="h" font-size="13">Deploy INT</text>
  <text x="106" y="459" class="mono">/usr/local/bin/dockpilot &#183; systemctl restart</text>

  <rect x="398" y="424" width="300" height="44" rx="10" fill="#111827" stroke="rgba(255,255,255,0.10)"/>
  <text x="412" y="442" class="h" font-size="13">Smoke test</text>
  <text x="412" y="459" class="mono">curl :8090 &#8594; expect 401 / 200</text>
  <line x1="382" y1="446" x2="398" y2="446" class="edge" marker-end="url(#arrow)"/>

  <line x1="390" y1="480" x2="390" y2="512" class="edge" marker-end="url(#arrow)"/>
  <text x="400" y="500" class="lbl">promote only if INT smoke passes</text>

  <!-- RING 2 TEST -->
  <rect x="60" y="514" width="660" height="118" rx="18" fill="rgba(59,130,246,0.06)" stroke="rgba(59,130,246,0.35)" stroke-width="1.5"/>
  <circle cx="92" cy="544" r="13" fill="#3b82f6"/>
  <text x="92" y="549" text-anchor="middle" font-size="13" font-weight="800" fill="#ffffff">2</text>
  <text x="116" y="549" class="h" fill="#93c5fd">RING 2 &#183; TEST</text>
  <text x="116" y="566" class="sub">debian001 &#183; runner label: test</text>

  <rect x="92" y="576" width="290" height="44" rx="10" fill="#111827" stroke="rgba(255,255,255,0.10)"/>
  <text x="106" y="594" class="h" font-size="13">Deploy TEST</text>
  <text x="106" y="611" class="mono">bootstraps systemd unit on first run</text>

  <rect x="398" y="576" width="300" height="44" rx="10" fill="#111827" stroke="rgba(255,255,255,0.10)"/>
  <text x="412" y="594" class="h" font-size="13">Smoke test</text>
  <text x="412" y="611" class="mono">curl :8090 &#8594; expect 401 / 200</text>
  <line x1="382" y1="598" x2="398" y2="598" class="edge" marker-end="url(#arrow)"/>

  <line x1="390" y1="632" x2="390" y2="658" class="edge" marker-end="url(#arrow)"/>

  <!-- Summary -->
  <rect x="290" y="660" width="200" height="34" rx="12" fill="#1f2937" stroke="rgba(255,255,255,0.10)"/>
  <text x="390" y="682" text-anchor="middle" class="h" font-size="13">Summary report</text>
</svg>
